name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: food
          POSTGRES_PASSWORD: food
          POSTGRES_DB: food_social
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U food -d food_social"
          --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      DATABASE_URL: postgres://food:food@localhost:5432/food_social?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version-file: go.mod}
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/api
